<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RevPlay — Sign in to stream your favorite music">
    <title>RevPlay — Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <h1>RevPlay</h1>
                <p>Stream. Discover. Repeat.</p>
            </div>

            <!-- Auth Card -->
            <div class="auth-card">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Sign Up</button>
                </div>

                <!-- Error / Success Messages -->
                <div class="error-message" id="authError"></div>
                <div class="success-message" id="authSuccess"></div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username or Email</label>
                        <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username or email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="loading-spinner"></span>
                    </button>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" class="form-input" placeholder="Choose a username" minlength="3" maxlength="50" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="At least 6 characters" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="regDisplayName">Display Name</label>
                        <input type="text" id="regDisplayName" class="form-input" placeholder="Your display name">
                    </div>
                    <div class="form-group">
                        <label for="regRole">I am a...</label>
                        <select id="regRole" class="form-select" onchange="toggleArtistFields()">
                            <option value="USER">Listener</option>
                            <option value="ARTIST">Artist / Creator</option>
                        </select>
                    </div>
                    <div class="artist-fields" id="artistFields">
                        <div class="form-group">
                            <label for="regArtistName">Artist / Stage Name</label>
                            <input type="text" id="regArtistName" class="form-input" placeholder="Your artist name">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                        <span class="btn-text">Create Account</span>
                        <span class="loading-spinner"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
